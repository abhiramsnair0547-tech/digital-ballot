<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voter Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to right, #6a11cb, #2575fc);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }
        .vote-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        .candidate-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-top: 15px;
        }
        .candidate-card {
            width: 100%;
            max-width: 250px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
            text-align: center;
            padding: 15px;
        }
        .candidate-card:hover {
            transform: scale(1.05);
        }
        .candidate-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
        }
        
        .form-check-input {
            display: none;
        }
        .form-check-label {
            display: block;
            font-weight: bold;
            cursor: pointer;
            padding-top: 5px;
        }
        .btn-custom {
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            padding: 10px;
        }
        /* Highlight selected candidate */
        .form-check-input:checked + .candidate-card {
            border: 3px solid #007bff;
            background-color: #e9f5ff;
        }
    </style>
</head>
<body>

    <div class="vote-card">
        <h2 class="mb-4">🗳️ Welcome, Voter!</h2>
        <form method="POST" action="{{ url_for('vote') }}">
            <h4 class="mb-3">Vote for a Candidate:</h4>

            <div class="candidate-container">
                {% for candidate in candidates %}
                    <label class="form-check-label" for="candidate{{ candidate.id }}">
                        <input class="form-check-input" type="radio" name="candidate" value="{{ candidate.id }}" id="candidate{{ candidate.id }}" required>
                        <div class="candidate-card">
                            <img src="{{ url_for('static', filename='uploads/' + candidate.image) }}" alt="{{ candidate.name }}">
                            <p>{{ candidate.name }}</p>
                        </div>
                    </label>
                {% endfor %}
            </div>

            <button type="submit" class="btn btn-primary mt-3 btn-custom">✅ Submit Vote</button>
        </form>
        <a href="{{ url_for('logout') }}" class="btn btn-danger mt-3 btn-custom">🚪 Logout</a>
    </div>

</body>
</html>
